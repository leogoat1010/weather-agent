name: "🌤️ Daily Weather Report"

on:
  schedule:
    # 北京时间 5:30 = UTC 21:30（前一天，提前2小时缓冲 GitHub Actions 调度延迟）
    - cron: "30 21 * * *"
  # 也支持手动触发（方便测试）
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v5

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行天气播报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
          QWEATHER_HOST: "https://m77fc42qjn.re.qweatherapi.com"
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          FRIENDS_CONFIG: ${{ secrets.FRIENDS_CONFIG }}
        run: python main.py
